services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloud}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_pgadmin_password}
      PGDATA: ${PGDATA:-/var/lib/postgresql/data/pgdata}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_volume:/var/lib/postgresql/data
      - ./docs/generated/dumps/postgres/data.sql:/docker-entrypoint-initdb.d/01-restore.sql:ro
    networks:
      - kenzap_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cloud}"]
      interval: 2s
      timeout: 1s
      retries: 15
      start_period: 1s  
  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8888}:8080"
    networks:
      - kenzap_network
    depends_on:
      - postgres
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs
    restart: always
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
    command: "server -s3 -dir=/data -ip=seaweedfs -ip.bind=0.0.0.0 -master.port=9333 -volume.port=8080 -filer.port=8888 -s3.port=8333"
    volumes:
      - seaweedfs_volume:/data
    networks:
      - kenzap_network
    ports:
      - "${S3_PORT:-9000}:8333"
  s3-seed:
    image: public.ecr.aws/aws-cli/aws-cli:latest
    container_name: s3_seed
    depends_on:
      - seaweedfs
    restart: "no"
    networks:
      - kenzap_network
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_DEFAULT_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT_INTERNAL: ${S3_ENDPOINT_INTERNAL:-http://seaweedfs:8333}
      S3_BUCKET: ${S3_BUCKET:-kenzap}
      S3_BUCKET_PRIVATE: ${S3_BUCKET_PRIVATE:-kenzap-private}
    volumes:
      - seaweedfs_volume:/data
      - ./docs/generated/dumps/s3:/seed/s3:ro
      - ./server/scripts/s3/seed-once.sh:/seed-once.sh:ro
    entrypoint: ["/bin/sh", "/seed-once.sh"]
  node:
      build:
        context: .
        dockerfile: Dockerfile-node
      container_name: node
      restart: unless-stopped
      ports:
        - "${APP_PORT:-3000}:3000"
        - "${LIVERELOAD_PORT:-35729}:35729"  # LiveReload port
      volumes:
        - ./server:/app/server
        - ./public:/app/public
        - ./dist:/app/dist
        - ./packages:/app/packages
        - ./overrides:/app/overrides
        - ./package.json:/app/package.json
        - ./package-lock.json:/app/package-lock.json
        - node_modules_volume:/app/node_modules
      networks:
        - kenzap_network
      depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
        seaweedfs:
          condition: service_started
        s3-seed:
          condition: service_completed_successfully
      env_file:
        - .env
      environment:
        S3_ENDPOINT: ${S3_ENDPOINT:-http://seaweedfs:8333}
        S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      command: sh -c "npm install && npm run dev"
      extra_hosts:  # 👈 Add this (Linux only, Mac/Windows doesn’t need it)
        - "host.docker.internal:host-gateway"
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_volume:/data
    networks:
      - kenzap_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 15
      start_period: 1s
volumes:
  redis_volume:
    driver: local
  postgres_volume:
    driver: local
  pgadmin_volume:
    driver: local
  seaweedfs_volume:
    driver: local
  node_modules_volume:
    driver: local

networks:
  kenzap_network:
    driver: bridge
