services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloud}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_pgadmin_password}
      PGDATA: ${PGDATA:-/var/lib/postgresql/data/pgdata}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_volume:/var/lib/postgresql/data
      - ./docs/generated/dumps/postgres/data.sql:/docker-entrypoint-initdb.d/01-restore.sql:ro
    networks:
      - kenzap_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cloud}"]
      interval: 2s
      timeout: 1s
      retries: 15
      start_period: 1s  
  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8888}:8080"
    networks:
      - kenzap_network
    depends_on:
      - postgres
  minio:
    image: minio/minio
    container_name: minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_volume:/data
    networks:
      - kenzap_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9001 || exit 1"]
      interval: 2s
      timeout: 1s
      retries: 15
      start_period: 1s
    ports:
      - "${MINIO_PORT:-9000}:9000"   # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # web console
  minio-init:
    image: minio/mc
    container_name: minio_init
    depends_on:
      - minio
    restart: "no"
    networks:
      - kenzap_network
    volumes:
      - minio_volume:/data
      - ./docs/generated/dumps/minio:/seed/minio:ro
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY}; do sleep 1; done;
      /usr/bin/mc mb -p local/${S3_BUCKET:-kenzap} || true;
      /usr/bin/mc mb -p local/${S3_BUCKET_PRIVATE:-kenzap-private} || true;
      /usr/bin/mc anonymous set download local/${S3_BUCKET:-kenzap} || true;
      /usr/bin/mc anonymous set none local/${S3_BUCKET_PRIVATE:-kenzap-private} || true;
      if [ -f /data/.seeded-from-dump ]; then
        echo 'MinIO seed already applied for this volume. Skipping object restore.';
      else
        if [ -d /seed/minio/${S3_BUCKET:-kenzap} ]; then
          /usr/bin/mc mirror --overwrite \
            --exclude ".DS_Store" --exclude "*/.DS_Store" \
            --exclude "._*" --exclude "*/._*" \
            --exclude ".Spotlight-V100/*" --exclude ".Trashes/*" \
            /seed/minio/${S3_BUCKET:-kenzap} local/${S3_BUCKET:-kenzap};
        elif [ -d /seed/minio ] && [ \"$(ls -A /seed/minio 2>/dev/null)\" ]; then
          /usr/bin/mc mirror --overwrite \
            --exclude ".DS_Store" --exclude "*/.DS_Store" \
            --exclude "._*" --exclude "*/._*" \
            --exclude ".Spotlight-V100/*" --exclude ".Trashes/*" \
            /seed/minio local/${S3_BUCKET:-kenzap};
        else
          echo 'No MinIO seed files found at /seed/minio. Skipping object restore.';
        fi;
        if [ -d /seed/minio/${S3_BUCKET_PRIVATE:-kenzap-private} ]; then
          /usr/bin/mc mirror --overwrite \
            --exclude ".DS_Store" --exclude "*/.DS_Store" \
            --exclude "._*" --exclude "*/._*" \
            --exclude ".Spotlight-V100/*" --exclude ".Trashes/*" \
            /seed/minio/${S3_BUCKET_PRIVATE:-kenzap-private} local/${S3_BUCKET_PRIVATE:-kenzap-private};
        fi;
        touch /data/.seeded-from-dump;
        echo 'MinIO seed marked as applied: /data/.seeded-from-dump';
      fi;
      exit 0;
      "
  node:
      build:
        context: .
        dockerfile: Dockerfile-node
      container_name: node
      restart: unless-stopped
      ports:
        - "${APP_PORT:-3000}:3000"
        - "${LIVERELOAD_PORT:-35729}:35729"  # LiveReload port
      volumes:
        - ./server:/app/server
        - ./public:/app/public
        - ./dist:/app/dist
        - ./packages:/app/packages
        - ./overrides:/app/overrides
        - ./package.json:/app/package.json
        - ./package-lock.json:/app/package-lock.json
        - node_modules_volume:/app/node_modules
      networks:
        - kenzap_network
      depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
        minio:
          condition: service_healthy
      env_file:
        - .env
      command: sh -c "npm install && npm run dev"
      extra_hosts:  # 👈 Add this (Linux only, Mac/Windows doesn’t need it)
        - "host.docker.internal:host-gateway"
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_volume:/data
    networks:
      - kenzap_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 15
      start_period: 1s
volumes:
  redis_volume:
    driver: local
  postgres_volume:
    driver: local
  pgadmin_volume:
    driver: local
  minio_volume:
    driver: local
  node_modules_volume:
    driver: local

networks:
  kenzap_network:
    driver: bridge
